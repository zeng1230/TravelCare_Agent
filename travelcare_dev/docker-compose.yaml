version: "3.9"
services:

  mysql:
    image: mysql:8.0
    container_name: travelcare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456   # 与 Spring Boot 密码一致
      MYSQL_DATABASE: travelcare_agent
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: travelcare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: travelcare-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 管理界面

volumes:
  mysql-data: