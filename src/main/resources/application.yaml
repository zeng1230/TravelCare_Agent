spring:
  application:
    name: TravelCare_Agent
  datasource:
    url: ${TRAVELCARE_DB_URL:jdbc:mysql://localhost:3307/travelcare_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${TRAVELCARE_REDIS_HOST:localhost}
      port: ${TRAVELCARE_REDIS_PORT:6379}
      password: ${TRAVELCARE_REDIS_PASSWORD:}
      database: ${TRAVELCARE_REDIS_DATABASE:0}
      timeout: 3s
  rabbitmq:
    publisher-confirm-type: correlated

travelcare:
  async:
    outbox:
      max-publish-attempts: ${TRAVELCARE_OUTBOX_MAX_PUBLISH_ATTEMPTS:3}
      retry-delay: ${TRAVELCARE_OUTBOX_RETRY_DELAY:1m}
      stale-publishing-after: ${TRAVELCARE_OUTBOX_STALE_PUBLISHING_AFTER:5m}
      confirm-timeout: ${TRAVELCARE_OUTBOX_CONFIRM_TIMEOUT:5s}
  agent:
    provider: ${TRAVELCARE_AGENT_PROVIDER:mock}
    model: ${TRAVELCARE_AGENT_MODEL:mock-stage10a}
    prompt-version: ${TRAVELCARE_AGENT_PROMPT_VERSION:stage10a-default}
    timeout-ms: ${TRAVELCARE_AGENT_TIMEOUT_MS:5000}
    api-key: ${TRAVELCARE_AGENT_API_KEY:}
    base-url: ${TRAVELCARE_AGENT_BASE_URL:https://api.deepseek.com}
    temperature: ${TRAVELCARE_AGENT_TEMPERATURE:0.0}
    deepseek:
      backend: ${TRAVELCARE_AGENT_DEEPSEEK_BACKEND:legacy}
  jwt:
    issuer: ${TRAVELCARE_JWT_ISSUER:travelcare-agent}
    secret: ${TRAVELCARE_JWT_SECRET:change-me-in-local-env}
    ttl-seconds: ${TRAVELCARE_JWT_TTL_SECONDS:7200}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

knife4j:
  enable: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{traceId:-}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
  endpoint:
    health:
      probes:
        enabled: false
      show-details: never
